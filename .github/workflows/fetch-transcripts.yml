name: Fetch YouTube Transcripts

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Install Node dependencies
        run: npm install

      - name: Fetch transcripts
        run: npm run fetch:transcripts

      - name: Commit updated corpus
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/corpus.json
          git diff --staged --quiet && echo "No new transcripts fetched" || (
            git commit -m "chore: add transcripts to corpus.json" &&
            git push
          )
